# Zen 5 / Strix Point Compiler Flags
# Note: If your GCC version is older, fallback to -march=x86-64-v4
COMMON_FLAGS="-O2 -march=znver5 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"

# Push all 24 threads for the compiler
MAKEOPTS="-j24"

# Critical for Radeon 890M Hardware Acceleration
VIDEO_CARDS="amdgpu radeonsi"

ACCEPT_KEYWORDS="~amd64"